<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour Data Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: #f1f1f1; }
        textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        textarea::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans p-6">

    <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-lg p-8">
        
        <div class="flex flex-col md:flex-row justify-between items-center border-b pb-4 mb-6 gap-4">
            <h1 class="text-3xl font-bold text-blue-900">Tour JSON Generator</h1>
            <div class="text-sm font-semibold bg-blue-100 text-blue-800 px-4 py-2 rounded-lg">
                <span id="count-multi">0</span> Multi-day | 
                <span id="count-exp">0</span> Experiences | 
                <span id="count-unique">0</span> Unique
            </div>
        </div>

        <div class="mb-6 bg-indigo-50 p-4 rounded-lg border border-indigo-200">
            <label class="block font-bold mb-2 text-indigo-900">1. Load Existing tours.json (Optional)</label>
            <div class="flex gap-2">
                <input type="file" id="fileInput" accept=".json" class="border bg-white p-2 rounded w-full">
                <button type="button" onclick="loadExistingJSON()" class="bg-indigo-600 text-white font-bold px-6 py-2 rounded hover:bg-indigo-700 transition whitespace-nowrap">
                    Load File
                </button>
            </div>
        </div>

        <form id="tourForm" class="space-y-6">
            
            <h2 class="text-xl font-bold text-gray-700 border-b pb-2">2. Add New Tour Details</h2>

            <div class="bg-blue-50 p-4 rounded-lg border border-blue-100">
                <label class="block font-bold mb-2">Select Category</label>
                <select id="category" class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500">
                    <option value="multidayTours">Multi-day Tour</option>
                    <option value="experiences">Day Experience</option>
                    <option value="uniqueExperiences">Unique Experience</option>
                </select>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label class="block font-semibold">Title</label><input type="text" id="title" class="w-full border p-2 rounded" required></div>
                <div><label class="block font-semibold">Price (USD)</label><input type="number" id="price" class="w-full border p-2 rounded" required></div>
                <div><label class="block font-semibold">Duration (e.g., 7 Days)</label><input type="text" id="duration" class="w-full border p-2 rounded" required></div>
                
                <div>
                    <label class="block font-semibold">Image File Name (Without .png)</label>
                    <div class="flex mt-1 shadow-sm">
                        <span id="image-path-prefix" class="inline-flex items-center px-3 rounded-l-md border border-r-0 border-gray-300 bg-gray-200 text-gray-600 text-sm font-medium">
                            /tours/multiday/
                        </span>
                        <input type="text" id="image-filename" class="flex-1 block w-full border border-gray-300 p-2 focus:ring-blue-500 focus:border-blue-500 min-w-0" placeholder="e.g. kandy-tour" required>
                        <span class="inline-flex items-center px-3 rounded-r-md border border-l-0 border-gray-300 bg-gray-200 text-gray-600 text-sm font-medium">
                            .png
                        </span>
                    </div>
                    <p class="text-xs text-gray-500 mt-1">Generated Image Path: <span id="path-preview" class="font-mono text-blue-600 font-bold">/tours/multiday/.png</span></p>
                </div>
            </div>
            
            <div>
                <label class="block font-semibold">Description</label>
                <textarea id="description" rows="3" class="w-full border p-2 rounded" required></textarea>
            </div>

            <div class="bg-yellow-50 p-4 rounded-lg border border-yellow-200">
                <p class="text-sm text-yellow-800 mb-4 font-semibold">💡 Tip: Enter one item per line for the fields below.</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label class="block font-semibold">Why you'll love this</label><textarea id="whyLove" rows="4" class="w-full border p-2 rounded"></textarea></div>
                    <div><label class="block font-semibold">Included Activities</label><textarea id="includedActivities" rows="4" class="w-full border p-2 rounded"></textarea></div>
                    <div><label class="block font-semibold">Optional Activities</label><textarea id="optionalActivities" rows="4" class="w-full border p-2 rounded"></textarea></div>
                </div>
            </div>

            <h3 class="text-xl font-bold text-gray-700">Inclusions Details</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label class="block font-semibold">Destinations</label><input type="text" id="destinations" class="w-full border p-2 rounded"></div>
                <div><label class="block font-semibold">Meals</label><input type="text" id="meals" class="w-full border p-2 rounded"></div>
                <div><label class="block font-semibold">Transport</label><input type="text" id="transport" class="w-full border p-2 rounded"></div>
                <div><label class="block font-semibold">Accommodation</label><input type="text" id="accommodation" class="w-full border p-2 rounded"></div>
            </div>

            <h3 class="text-xl font-bold text-gray-700">Before You Book (One item per line)</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label class="block font-semibold">Right for you</label><textarea id="rightForYou" rows="3" class="w-full border p-2 rounded"></textarea></div>
                <div><label class="block font-semibold">Visas</label><textarea id="visas" rows="3" class="w-full border p-2 rounded"></textarea></div>
                <div><label class="block font-semibold">Accommodation Info</label><textarea id="accInfo" rows="3" class="w-full border p-2 rounded"></textarea></div>
                <div><label class="block font-semibold">Joining Point</label><textarea id="joiningPoint" rows="3" class="w-full border p-2 rounded"></textarea></div>
            </div>

            <div class="flex justify-between items-center">
                <h3 class="text-xl font-bold text-gray-700">Itinerary</h3>
                <button type="button" onclick="addItineraryDay()" class="bg-gray-800 text-white px-3 py-1 rounded hover:bg-gray-700 text-sm">
                    + Add Day
                </button>
            </div>
            <div id="itineraryContainer" class="space-y-4"></div>

            <div class="flex flex-col md:flex-row gap-4 mt-8 pt-4 border-t">
                <button type="button" onclick="saveCurrentTour()" class="flex-1 bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition shadow-md">
                    3. Save to List
                </button>
                <button type="button" onclick="generateAndDownloadJSON()" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition shadow-md">
                    4. Download JSON
                </button>
                <button type="button" onclick="downloadFoldersAndList()" class="flex-1 bg-purple-600 text-white font-bold py-3 rounded-lg hover:bg-purple-700 transition shadow-md">
                    5. Download Folders (.zip)
                </button>
            </div>
            
        </form>
    </div>

    <script>
        let toursData = { multidayTours: [], experiences: [], uniqueExperiences: [] };

        const imagePaths = {
            multidayTours: "/tours/multiday/",
            experiences: "/tours/experiences/",
            uniqueExperiences: "/tours/unique/"
        };

        const prefixSpan = document.getElementById('image-path-prefix');
        const fileNameInput = document.getElementById('image-filename');
        const pathPreview = document.getElementById('path-preview');
        const categorySelect = document.getElementById('category');

        function updatePathPreview() {
            const fileName = fileNameInput.value.trim();
            const prefix = prefixSpan.innerText.trim();
            pathPreview.innerText = prefix + fileName + ".png";
        }

        fileNameInput.addEventListener('input', updatePathPreview);
        categorySelect.addEventListener('change', function() {
            prefixSpan.innerText = imagePaths[this.value];
            updatePathPreview();
        });

        const textToArray = (id) => {
            const val = document.getElementById(id).value.trim();
            return val ? val.split('\n').map(item => item.trim()).filter(item => item !== "") : [];
        };

        function addItineraryDay() {
            const container = document.getElementById('itineraryContainer');
            const dayDiv = document.createElement('div');
            dayDiv.className = 'itinerary-item bg-gray-50 border p-4 rounded-lg flex gap-4 items-start';
            dayDiv.innerHTML = `
                <div class="w-1/3">
                    <input type="text" class="day-title w-full border p-2 rounded" placeholder="Day Title (e.g. Day 1)">
                </div>
                <div class="w-2/3 flex gap-2">
                    <textarea class="day-desc w-full border p-2 rounded" rows="2" placeholder="Description..."></textarea>
                    <button type="button" onclick="this.parentElement.parentElement.remove()" class="bg-red-500 text-white px-3 rounded hover:bg-red-600">X</button>
                </div>
            `;
            container.appendChild(dayDiv);
        }
        addItineraryDay();

        function loadExistingJSON() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if(!file) { alert("Please choose a file first!"); return; }

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const loadedData = JSON.parse(e.target.result);
                    toursData.multidayTours = loadedData.multidayTours || [];
                    toursData.experiences = loadedData.experiences || [];
                    toursData.uniqueExperiences = loadedData.uniqueExperiences || [];
                    updateCounters();
                    alert("Old Data Loaded Successfully! You can now add new tours.");
                    fileInput.value = ""; 
                } catch(err) {
                    alert("Error: The file is not a valid JSON.");
                }
            };
            reader.readAsText(file);
        }

        function saveCurrentTour() {
            const title = document.getElementById('title').value.trim();
            const fileName = fileNameInput.value.trim();
            
            if(!title) { alert("Please enter a Title before saving."); return; }
            if(!fileName) { alert("Please enter an Image File Name before saving."); return; }

            const fullImageUrl = prefixSpan.innerText.trim() + fileName + ".png";

            const itineraryItems = [];
            document.querySelectorAll('.itinerary-item').forEach(item => {
                const dayTitle = item.querySelector('.day-title').value.trim();
                const dayDesc = item.querySelector('.day-desc').value.trim();
                if(dayTitle || dayDesc) itineraryItems.push({ title: dayTitle, desc: dayDesc });
            });

            const tourObject = {
                title: title,
                price: Number(document.getElementById('price').value) || 0,
                duration: document.getElementById('duration').value,
                image: fullImageUrl,
                description: document.getElementById('description').value,
                whyLove: textToArray('whyLove'),
                inclusions: {
                    destinations: document.getElementById('destinations').value,
                    meals: document.getElementById('meals').value,
                    transport: document.getElementById('transport').value,
                    accommodation: document.getElementById('accommodation').value,
                    includedActivities: textToArray('includedActivities'),
                    optionalActivities: textToArray('optionalActivities')
                },
                beforeYouBook: {
                    rightForYou: textToArray('rightForYou'),
                    visas: textToArray('visas'),
                    accommodation: textToArray('accInfo'),
                    joiningPoint: textToArray('joiningPoint')
                },
                itinerary: itineraryItems
            };

            const category = categorySelect.value;
            toursData[category].push(tourObject);

            updateCounters();
            document.getElementById('tourForm').reset();
            prefixSpan.innerText = imagePaths[categorySelect.value];
            updatePathPreview();
            document.getElementById('itineraryContainer').innerHTML = '';
            addItineraryDay(); 
            alert(`Added to ${category}! Add another or click Download JSON.`);
        }

        function updateCounters() {
            document.getElementById('count-multi').innerText = toursData.multidayTours.length;
            document.getElementById('count-exp').innerText = toursData.experiences.length;
            document.getElementById('count-unique').innerText = toursData.uniqueExperiences.length;
        }

        function generateAndDownloadJSON() {
            const totalItems = toursData.multidayTours.length + toursData.experiences.length + toursData.uniqueExperiences.length;
            if(totalItems === 0) { alert("No tours to download!"); return; }

            const jsonString = JSON.stringify(toursData, null, 2);
            const blob = new Blob([jsonString], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "tours.json";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // NEW: Generate Folders and Image Checklist ZIP
        function downloadFoldersAndList() {
            const totalItems = toursData.multidayTours.length + toursData.experiences.length + toursData.uniqueExperiences.length;
            if(totalItems === 0) { 
                alert("No tours added yet! Please load a JSON or add some tours first."); 
                return; 
            }

            var zip = new JSZip();
            
            // Create folder structure inside the ZIP
            var publicFolder = zip.folder("public");
            var toursFolder = publicFolder.folder("tours");
            
            toursFolder.folder("multiday");
            toursFolder.folder("experiences");
            toursFolder.folder("unique");

            // Generate checklist text file
            let txt = "TOUR IMAGES CHECKLIST\n";
            txt += "=====================\n";
            txt += "Please place your image files in the exact folders as listed below:\n\n";

            if(toursData.multidayTours.length > 0) {
                txt += "--- Multi-day Tours ---\n";
                toursData.multidayTours.forEach(t => txt += `[ ] public${t.image}\n`);
                txt += "\n";
            }
            if(toursData.experiences.length > 0) {
                txt += "--- Day Experiences ---\n";
                toursData.experiences.forEach(t => txt += `[ ] public${t.image}\n`);
                txt += "\n";
            }
            if(toursData.uniqueExperiences.length > 0) {
                txt += "--- Unique Experiences ---\n";
                toursData.uniqueExperiences.forEach(t => txt += `[ ] public${t.image}\n`);
                txt += "\n";
            }

            toursFolder.file("Image_Checklist.txt", txt);

            // Generate ZIP and trigger download
            zip.generateAsync({type:"blob"}).then(function(content) {
                const url = URL.createObjectURL(content);
                const a = document.createElement('a');
                a.href = url;
                a.download = "Tour_Folders_Structure.zip";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });
        }
    </script>
</body>
</html>
